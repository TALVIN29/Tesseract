# ============================================================
# PROJECT TESSERACT — NearMissPacket Schema v1.0
# OpenAPI 3.1 Component Definition
# Audit Patches applied:
#   3B: signal_aggregation_hint added
#   3C: schema_version added
# ============================================================
# Transport: Plane → Cube (POST /api/v1/cube/evaluate)
# Auth: mTLS (Plane CA) + service account JWT
# Idempotency: packet_id is the deduplication key
# ============================================================

openapi: "3.1.0"
info:
  title: Tesseract NearMissPacket Schema
  version: "1.0.0"

components:
  schemas:
    NearMissPacket:
      type: object
      description: >
        The sole input type accepted by the Inner Cube's evaluate endpoint.
        Constructed by the Near Miss Event Emitter n8n sub-workflow.
        The Cube REJECTS any packet with an unsupported schema_version.
        The Cube RETURNS the original verdict (without re-evaluation) for duplicate packet_ids.
      required:
        - schema_version
        - packet_id
        - originating_workflow
        - entity_id_hashed
        - event_timestamp
        - risk_signals
        - segmentation_context
        - signal_aggregation_hint
      additionalProperties: false
      properties:

        schema_version:
          type: string
          pattern: '^v\d+\.\d+$'
          description: >
            Semantic version of the NearMissPacket schema used to construct this packet.
            The Cube maintains a list of supported versions and rejects unsupported ones
            with HTTP 422 Unprocessable Entity.
            V1 prototype locks this to "v1.0".
          example: "v1.0"

        packet_id:
          type: string
          format: uuid
          description: >
            Idempotency key. Generated by the Near Miss Event Emitter per event.
            The Cube checks this before evaluation:
              - If not seen before: evaluate and write Audit Ledger entry.
              - If already seen: return original verdict with already_processed: true. No re-evaluation.
          example: "b7e3f2a1-5678-4cde-9012-abcdef123456"

        originating_workflow:
          type: string
          maxLength: 128
          description: >
            n8n workflow ID that constructed this packet.
            Written to the Audit Ledger for traceability.
          example: "elevated-monitoring-workflow"

        entity_id_hashed:
          type: string
          minLength: 64
          maxLength: 64
          pattern: '^[a-f0-9]{64}$'
          description: >
            SHA-256 hex digest of entity identifier. Matches entity_id_hashed in SegmentationPayload.
            Never contains raw PII.

        event_timestamp:
          type: string
          format: date-time
          description: "ISO 8601 timestamp of when the triggering event occurred in the Plane."
          example: "2026-06-08T10:15:30Z"

        signal_aggregation_hint:
          type: string
          enum:
            - MAX_SEVERITY
            - FIRST_MATCH
          default: MAX_SEVERITY
          description: >
            Audit Finding 3B: specifies how the Cube should aggregate multiple risk_signals
            into a single verdict.
            MAX_SEVERITY: evaluate all signals, return the highest-severity verdict.
              (SUSPEND > NEAR_MISS > WATCHLIST)
            FIRST_MATCH: evaluate signals in array order, return first verdict that matches a rule.
            V1 prototype MUST use MAX_SEVERITY. FIRST_MATCH is reserved for future use.
          example: "MAX_SEVERITY"

        risk_signals:
          type: array
          minItems: 1
          description: >
            One or more risk signals detected by the Plane workflow.
            The Cube evaluates all signals and aggregates per signal_aggregation_hint.
          items:
            type: object
            required:
              - signal_type
              - signal_value
              - threshold_reference
            additionalProperties: false
            properties:

              signal_type:
                type: string
                enum:
                  - VELOCITY_BREACH
                  - AUTH_ANOMALY
                  - BEHAVIORAL_DEVIATION
                  - REGULATORY_MATCH
                  - BOUNDARY_PROBE
                  - RULE_GAP_EXPOSURE
                  - DIRECT_ACCESS_ATTEMPT
                  - GEOGRAPHIC_INCONSISTENCY
                  - DATA_PATTERN_IRREGULARITY
                  - WATCHLIST_RECURRENCE
                description: >
                  The type of risk signal detected. Maps to a specific Cube rule evaluator.
                  RULE_GAP_EXPOSURE: signal that does not match any active rule (Near Miss by definition).
                  DIRECT_ACCESS_ATTEMPT: Sphere attempted to bypass the Plane layer.
                example: "AUTH_ANOMALY"

              signal_value:
                type: number
                description: >
                  Numeric representation of signal intensity.
                  Interpretation is signal_type-specific:
                    AUTH_ANOMALY: failed attempt count
                    VELOCITY_BREACH: percentage of permitted limit (0.0–1.0, where 1.0 = 100%)
                    BEHAVIORAL_DEVIATION: standard deviations below cohort baseline
                example: 3

              threshold_reference:
                type: string
                maxLength: 128
                description: >
                  The YAML rule ID from the Cube rule store that this signal maps to.
                  Written to the Audit Ledger as matched_rule.
                  Use "UNKNOWN" for RULE_GAP_EXPOSURE signals.
                example: "base-edges.e2.auth-anomaly-threshold"

              signal_context:
                type: object
                description: >
                  Optional: additional structured context for this specific signal.
                  Free-form but must not contain PII.
                additionalProperties: true

        segmentation_context:
          $ref: './segmentation-payload.yaml#/components/schemas/SegmentationPayload'
