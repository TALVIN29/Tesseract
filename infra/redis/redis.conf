# ============================================================
# PROJECT TESSERACT — Redis Configuration
# Tuned for Shock Absorption Queue + DLQ reliability
# ============================================================

# Persistence: AOF (Append Only File) ensures no message loss on restart
appendonly yes
appendfsync everysec

# Prevent silent message eviction under memory pressure.
# noeviction: Redis returns OOM errors rather than evicting keys.
# This is intentional — we want explicit failure, not silent data loss.
maxmemory-policy noeviction

# Maximum memory (adjust per environment — 512mb for local dev)
maxmemory 512mb

# ------------------------------------------------------------
# Stream settings
# ------------------------------------------------------------

# Maximum length of tesseract:sphere-events stream (trimmed by MAXLEN in XADD)
# This is a soft limit — actual trimming is done by the producer (n8n gateway enqueue)

# Lazy freeing: async memory reclaim for large key deletions (non-blocking)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ------------------------------------------------------------
# Connection settings
# ------------------------------------------------------------
bind 0.0.0.0
protected-mode no

# TCP backlog for burst connection handling
tcp-backlog 511

# Keepalive
tcp-keepalive 300

# ------------------------------------------------------------
# Pub/Sub settings (used for CUBE_LOCKDOWN broadcast)
# ------------------------------------------------------------
# No special config needed — default Pub/Sub is sufficient for lockdown channel

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
loglevel notice
logfile ""

# ------------------------------------------------------------
# Slow log: capture any command taking > 10ms
# (useful for detecting queue processing bottlenecks)
# ------------------------------------------------------------
slowlog-log-slower-than 10000
slowlog-max-len 128
